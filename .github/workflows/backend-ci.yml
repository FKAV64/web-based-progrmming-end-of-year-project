name: Backend CI

on:
  push:
    paths:
      - 'repo/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'repo/backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crypto_dashboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crypto_dashboard_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-at-least-32-bytes-long
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-bytes-long
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      COOKIE_DOMAIN: localhost
      FRONTEND_ORIGIN: http://localhost:4200
      VAPID_PUBLIC_KEY: BEl62iUYgUivxIkv69yViEuiBIa-Ib9-SkvMeAtA3LFgDzkrxZJjSgSnfckjBJuBkr3qBUYIHBQFLXYp5Nksh8U
      VAPID_PRIVATE_KEY: UUxI4O8-HoximlQ9_YJVuK82nJJsUNEn7hbhPRqxF7M
      VAPID_SUBJECT: mailto:ci@example.com
      NODE_ENV: test
      PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: repo/backend/package-lock.json

      - name: Install dependencies
        working-directory: repo/backend
        run: npm ci

      - name: Run Prisma migrations
        working-directory: repo/backend
        run: npx prisma migrate deploy

      - name: Lint
        working-directory: repo/backend
        run: npm run lint

      - name: Run tests with coverage
        working-directory: repo/backend
        run: npm test -- --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: repo/backend/coverage/
          retention-days: 7

      - name: Run E2E tests
        working-directory: repo/backend
        run: npm run test:e2e

      - name: Build
        working-directory: repo/backend
        run: npm run build

      - name: Generate OpenAPI spec
        working-directory: repo/backend
        run: npm run openapi:generate

      - name: Verify spec is committed and up to date
        run: git diff --exit-code repo/docs/openapi.yaml repo/docs/openapi.json
