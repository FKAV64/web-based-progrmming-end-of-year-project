<mat-sidenav-container class="h-screen">
  <!-- Side nav -->
  <mat-sidenav
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="sidenavOpen()"
    (closedStart)="sidenavOpen.set(false)"
    class="w-56 bg-gray-900 dark:bg-gray-950 text-white"
  >
    <div class="p-4 border-b border-gray-700">
      <span class="font-bold text-lg tracking-tight">₿ Kripto</span>
    </div>
    <mat-nav-list class="pt-2">
      @for (item of navItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="bg-indigo-600 text-white"
          class="text-gray-300 hover:bg-gray-700 rounded mx-2 mb-1"
          (click)="isMobile() && sidenavOpen.set(false)"
          [attr.aria-label]="item.label"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main content -->
  <mat-sidenav-content class="flex flex-col">
    <!-- Top bar -->
    <mat-toolbar color="primary" class="flex items-center gap-2 shadow-md flex-shrink-0">
      <button mat-icon-button (click)="sidenavOpen.set(!sidenavOpen())"
              i18n-aria-label="@@shell.toggle-menu" aria-label="Menüyü aç/kapat">
        <mat-icon>menu</mat-icon>
      </button>

      <!-- Search placeholder — hidden on small screens to prevent overflow -->
      <div class="hidden md:flex flex-1 max-w-xs mx-4">
        <div class="flex items-center bg-white/10 rounded-lg px-3 py-1 gap-2 cursor-not-allowed opacity-60 w-full">
          <mat-icon class="text-white/70 text-base">search</mat-icon>
          <span class="text-white/70 text-sm" i18n="@@shell.search-placeholder">Coin ara...</span>
        </div>
      </div>

      <!-- WebSocket connection status -->
      <app-connection-status [state]="ws.connectionState()"></app-connection-status>

      <span class="flex-1"></span>

      <!-- Currency selector — hidden on xs, shown from sm -->
      <mat-select
        [value]="settings.currency()"
        (selectionChange)="setCurrency($event.value)"
        class="text-white w-20 hidden sm:block"
        i18n-aria-label="@@shell.currency-select" aria-label="Para birimi seç"
      >
        @for (c of currencies; track c) {
          <mat-option [value]="c">{{ c }}</mat-option>
        }
      </mat-select>

      <!-- Theme toggle -->
      <button mat-icon-button (click)="toggleTheme()" [attr.aria-label]="'Temayı değiştir: ' + settings.theme()">
        <mat-icon>{{ settings.theme() === 'DARK' ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <!-- User menu -->
      <button mat-icon-button [matMenuTriggerFor]="userMenu"
              i18n-aria-label="@@shell.user-menu" aria-label="Kullanıcı menüsü">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <div class="px-4 py-2 text-sm text-gray-700">
          {{ auth.currentUser()?.email }}
        </div>
        <mat-divider></mat-divider>
        <!-- Currency in menu on mobile -->
        <div class="px-4 py-2 sm:hidden">
          <mat-select
            [value]="settings.currency()"
            (selectionChange)="setCurrency($event.value)"
            class="w-full"
            i18n-aria-label="@@shell.currency-select" aria-label="Para birimi seç"
          >
            @for (c of currencies; track c) {
              <mat-option [value]="c">{{ c }}</mat-option>
            }
          </mat-select>
        </div>
        <mat-divider class="sm:hidden"></mat-divider>
        <button mat-menu-item routerLink="/settings">
          <mat-icon>settings</mat-icon>
          <span i18n="@@shell.menu-settings">Ayarlar</span>
        </button>
        <button mat-menu-item (click)="auth.logout()">
          <mat-icon>logout</mat-icon>
          <span i18n="@@shell.menu-logout">Çıkış Yap</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <!-- Accessible live region for toast announcements -->
    <div aria-live="polite" aria-atomic="true" class="sr-only" id="toast-announcer"></div>

    <!-- Page content -->
    <div class="flex-1 overflow-auto bg-gray-50 dark:bg-gray-900">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
